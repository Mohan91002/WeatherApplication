<div class="map" aria-hidden="true">
  <div class="map__focus" [style.transform]="focusTransform()">
    <svg
      class="map__svg"
      [attr.width]="mapWidth"
      [attr.height]="mapHeight"
      viewBox="0 0 360 180"
      preserveAspectRatio="none"
      focusable="false"
    >
      <!-- graticule -->
      <g class="map__grid">
        @for (lon of [30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330]; track lon) {
          <line [attr.x1]="lon" y1="0" [attr.x2]="lon" y2="180" />
        }
        @for (lat of [30, 60, 90, 120, 150]; track lat) {
          <line x1="0" [attr.y1]="lat" x2="360" [attr.y2]="lat" />
        }
      </g>

      <!-- land -->
      <path class="map__land" [attr.d]="landPath" />

      <!-- focused-location marker -->
      @if (marker(); as m) {
        <g class="map__marker" [attr.transform]="'translate(' + m.x + ' ' + m.y + ')'">
          <circle class="map__marker-halo" r="9" />
          <circle class="map__marker-ring" r="4.5" />
          <circle class="map__marker-dot" r="1.8" />
        </g>
      }
    </svg>
  </div>
</div>
